<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIAI - 电子女友</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-screen" id="authScreen" hidden>
      <div class="auth-card">
        <div class="brand auth-brand">
          <div class="brand-mark">♡</div>
          <div>
            <strong>AIAI</strong>
            <span>AI 女友</span>
          </div>
        </div>
        <div class="auth-tabs">
          <button class="is-active" data-auth-tab="login">登录</button>
          <button data-auth-tab="register">注册</button>
        </div>
        <label class="field-block">
          <span>用户名</span>
          <input id="authScreenEmail" type="text" autocomplete="username" placeholder="用户名" />
        </label>
        <label class="field-block" id="authNicknameRow" hidden>
          <span>昵称</span>
          <input id="authScreenNickname" type="text" placeholder="给自己起个昵称" />
        </label>
        <label class="field-block">
          <span>密码</span>
          <input id="authScreenPassword" type="password" autocomplete="current-password" placeholder="至少 6 位" />
        </label>
        <label class="field-block" id="authConfirmRow" hidden>
          <span>确认密码</span>
          <input id="authScreenConfirm" type="password" autocomplete="new-password" placeholder="再次输入密码" />
        </label>
        <p class="legal auth-error" id="authScreenError"></p>
        <button class="primary-button auth-submit" id="authScreenSubmit">登录</button>
        <button class="ghost-link" id="authGuestLink">暂不登录，先看看 ›</button>
      </div>
    </div>

    <div class="app-shell gf-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">♡</div>
          <div>
            <strong>AIAI</strong>
            <span>AI 女友</span>
          </div>
        </div>
        <nav class="nav" aria-label="主导航">
          <button class="nav-item is-active" data-view="home"><span>女友</span></button>
          <button class="nav-item" data-view="profile"><span>我</span></button>
        </nav>
      </aside>

      <main class="workspace gf-workspace">
        <section class="view is-visible gf-stage game-stage" id="view-home">
          <div class="game-sky"></div>
          <div class="game-topbar">
            <button class="player-pill" id="stageGirlfriendButton" aria-label="切换女友">
              <img id="activeAvatarMini" alt="当前女友" />
              <span>
                <b id="stageName">AIAI</b>
                <small id="stageTag">等待定制</small>
              </span>
            </button>
            <div class="relationship-link" aria-label="亲密关系">
              <span class="relationship-title">亲密度</span>
              <span class="relationship-line"><i id="relationshipFill"></i></span>
              <b id="relationshipLabel">Lv.1</b>
            </div>
            <button class="me-pill" data-view="profile" aria-label="进入我的主页">
              <span>
                <b>我</b>
                <small>主页</small>
              </span>
              <img id="userAvatarMini" alt="我的头像" />
            </button>
          </div>
          <div class="stage-empty" id="stageEmpty" hidden>
            <p>先定制一个属于你的电子女友</p>
          </div>
          <button class="character-button" id="stageTouch" type="button" aria-label="互动">
            <span class="character-aura"></span>
            <img id="stageImage" class="stage-image" alt="女友形象" />
          </button>
          <div class="stage-chat-dock">
            <div class="stage-chat-messages" id="stageChatMessages"></div>
            <div class="stage-chat-composer">
              <input id="stageChatInput" type="text" placeholder="跟她说点什么..." />
              <button class="video-chip" id="stageVideoButton" type="button">视频</button>
              <button class="send-chip" id="stageChatSend" type="button">发送</button>
            </div>
          </div>
        </section>

        <section class="view" id="view-profile" aria-labelledby="profileTitle">
          <div class="profile-layout logged-profile me-page">
            <section class="profile-hero">
              <button class="icon-button me-back-button" data-view="home" aria-label="返回">‹</button>
              <img id="profileAvatar" alt="资料头像" />
              <div>
                <span class="eyebrow">我的</span>
                <h1 id="profileTitle">游客</h1>
                <span id="profileId">未登录</span>
              </div>
              <button class="icon-button profile-settings-button" data-open-settings aria-label="设置">⋯</button>
            </section>

            <section class="membership-band">
              <div>
                <span>钻石余额</span>
                <h2><span id="coinBalance">—</span></h2>
              </div>
              <button class="primary-button" data-open-upgrade>充值</button>
            </section>

          </div>
        </section>
      </main>
    </div>

    <dialog id="chatModal" class="modal chat-modal">
      <div class="modal-head">
        <div class="chat-modal-head">
          <img id="chatAvatar" alt="女友头像" />
          <h2 id="chatName">聊天</h2>
        </div>
        <button class="icon-button" data-close-chat>×</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input">
        <input id="chatInputField" type="text" placeholder="跟她说点什么..." />
        <button id="chatSendButton">➤</button>
      </div>
    </dialog>

    <dialog id="videoModal" class="modal video-modal">
      <div class="modal-head">
        <div>
          <h2>生成视频</h2>
          <span>为她选择一个视频风格</span>
        </div>
        <button class="icon-button" data-close-video>×</button>
      </div>
      <div class="style-grid" id="styleGrid"></div>
      <div class="generate-bar">
        <div class="create-summary">
          <div><span>风格</span><strong id="poseName"></strong></div>
          <div><span>消耗</span><strong><span id="generateCost">96</span></strong></div>
        </div>
        <button class="primary-button" id="generateButton">生成视频</button>
        <div class="preview-state generate-state" id="previewState">准备就绪</div>
      </div>
    </dialog>

    <dialog id="girlfriendSwitchModal" class="modal switcher-modal">
      <div class="modal-head">
        <div>
          <h2>切换女友</h2>
          <span>不同女友会有不同亲密度。</span>
        </div>
        <button class="icon-button" data-close-switcher>×</button>
      </div>
      <div class="gf-switch-grid" id="gfSwitchGrid"></div>
    </dialog>

    <dialog id="customizeModal" class="modal customize-modal">
      <div class="modal-head">
        <div>
          <h2>定制女友</h2>
          <span>选择形象或上传图片，给她起个名字</span>
        </div>
        <button class="icon-button" data-close-customize>×</button>
      </div>
      <div class="person-grid" id="personGrid"></div>
      <label class="upload-card" id="uploadCard">
        <input id="personUploadInput" type="file" accept="image/*" />
        <span>＋</span>
        <strong>上传形象图片</strong>
        <small id="uploadHint">支持 JPG / PNG</small>
      </label>
      <label class="field-block">
        <span>她的名字</span>
        <input id="gfNameInput" type="text" placeholder="给她起个名字" />
      </label>
      <p class="legal" id="customizeError"></p>
      <div class="confirm-actions">
        <button class="secondary-button" data-close-customize>取消</button>
        <button class="primary-button" id="saveGirlfriendButton">保存</button>
      </div>
    </dialog>

    <dialog id="upgradeModal" class="modal upgrade-modal confirm-modal">
      <div class="modal-head">
        <div>
          <h2>充值</h2>
          <span>选择支付方式</span>
        </div>
        <button class="icon-button" data-close-upgrade>×</button>
      </div>
      <div class="deal-strip">
        <strong>选择支付方式后进入支付确认。</strong>
        <span>这里只是演示流程，不会真正发起支付。</span>
      </div>
      <div class="payment-grid">
        <button class="payment-card" data-payment="微信支付">
          <span>微信</span>
          <strong>微信支付</strong>
        </button>
        <button class="payment-card" data-payment="支付宝">
          <span>支付宝</span>
          <strong>支付宝</strong>
        </button>
      </div>
    </dialog>

    <dialog id="profileEditModal" class="modal confirm-modal">
      <div class="modal-head">
        <div>
          <h2>编辑资料</h2>
          <span>ID 不支持修改，只能修改昵称。</span>
        </div>
        <button class="icon-button" data-close-profile-edit>×</button>
      </div>
      <label class="field-block">
        <span>昵称</span>
        <input id="nicknameInput" type="text" value="" />
      </label>
      <label class="field-block">
        <span>ID</span>
        <input id="profileIdInput" type="text" value="" disabled />
      </label>
      <div class="confirm-actions">
        <button class="secondary-button" data-close-profile-edit>取消</button>
        <button class="primary-button" data-save-profile>保存</button>
      </div>
    </dialog>

    <dialog id="settingsModal" class="modal confirm-modal">
      <div class="modal-head">
        <div>
          <h2>设置</h2>
        </div>
        <button class="icon-button" data-close-settings>×</button>
      </div>
      <div class="settings-row language-row">
        <span>语言</span>
        <div class="locale-switch profile-locale" aria-label="语言切换">
          <a class="is-active" href="index.html">中文</a>
          <a href="ja.html">日本語</a>
        </div>
      </div>
      <div class="settings-stack">
        <button class="delete-account-button" id="changePasswordButton">修改密码</button>
        <button class="delete-account-button" id="profileAuthButton">登录</button>
        <button class="delete-account-button" data-open-delete>删除账户</button>
      </div>
    </dialog>

    <dialog id="passwordModal" class="modal confirm-modal">
      <div class="modal-head">
        <div>
          <h2>修改密码</h2>
        </div>
        <button class="icon-button" data-close-password>×</button>
      </div>
      <label class="field-block">
        <span>新密码</span>
        <input id="newPasswordInput" type="password" autocomplete="new-password" placeholder="至少 6 位" />
      </label>
      <label class="field-block">
        <span>确认新密码</span>
        <input id="confirmPasswordInput" type="password" autocomplete="new-password" placeholder="再次输入" />
      </label>
      <p class="legal" id="passwordError"></p>
      <div class="confirm-actions">
        <button class="secondary-button" data-close-password>取消</button>
        <button class="primary-button" id="savePasswordButton">保存</button>
      </div>
    </dialog>

    <dialog id="deleteConfirmModal" class="modal confirm-modal">
      <div class="modal-head">
        <div>
          <h2>确认删除账户？</h2>
          <span>确认后将提交账户删除请求。</span>
        </div>
        <button class="icon-button" data-close-delete>×</button>
      </div>
      <div class="confirm-actions">
        <button class="secondary-button" data-close-delete>取消</button>
        <button class="primary-button" data-confirm-delete>确认删除</button>
      </div>
    </dialog>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
  </body>
</html>
